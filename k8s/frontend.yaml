apiVersion: apps/v1
kind: Deployment
metadata:
  name: express-frontend
spec:
  selector:
    matchLabels:
      app: express-frontend
  template:
    metadata:
      labels:
        app: express-frontend
    spec:
      containers:
        - name: express-frontend
          image: docker.io/coderocean/express-frontend:latest
          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
            requests:
              memory: "100Mi"
              cpu: "400m"
          ports:
            - containerPort: 3000
          -env:
          env:
           - name: BACKEND_URL
             value: http://flask-backend:5000/api

---
apiVersion: v1
kind: Service
metadata:
  name: express-frontend
spec:
  selector:
    app: express-frontend
  ports:
  - port: 3000
    targetPort: 3000
